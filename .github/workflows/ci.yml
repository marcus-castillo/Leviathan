name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    name: tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dir: backend
          - name: corpus
            dir: corpus
          - name: graph
            dir: graph
          - name: scotus
            dir: scotus
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.dir }}/requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest -q

  compile-check:
    name: py_compile (all packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile all Python sources
        run: |
          python -m compileall -q backend/app backend/scripts \
                                   corpus/levcorpus \
                                   graph/graphapp graph/scripts \
                                   scotus/scotusapp scotus/scripts

  frontend-build:
    name: frontend typecheck (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bias-dashboard
            dir: frontend
          - name: graph-explorer
            dir: graph/frontend
          - name: scotus-dashboard
            dir: scotus/frontend
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package.json
      - name: Install
        run: npm install
      - name: Type-check
        run: npx tsc --noEmit
